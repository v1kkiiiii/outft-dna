<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1A1916">
<title>outft. · DNA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#1A1916;color:#F0EBE3;font-family:'Jost',sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}

/* ── CSS vars ── */
:root{
  --ink:#1A1916;--ink2:#2A2820;
  --cream:#F0EBE3;--taupe:#B5ADA3;--sand:#CDB89B;--mid:#8A8278;
  --border:rgba(240,235,227,.12);--border2:rgba(240,235,227,.22);
  --serif:'Cormorant Garamond',serif;--sans:'Jost',sans-serif;--mono:'JetBrains Mono',monospace;
}

/* ── Screens ── */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .3s,transform .3s}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(12px)}

/* ── SCREEN 0 — splash ── */
#s-splash{background:#1A1916;align-items:center;justify-content:center;gap:8px}
.splash-logo{font-family:var(--serif);font-size:52px;font-weight:300;color:var(--cream);letter-spacing:-.02em}
.splash-sub{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--taupe);margin-top:2px}
.splash-cta{margin-top:40px;padding:14px 36px;border:1px solid var(--border2);border-radius:999px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--cream);background:transparent;cursor:pointer;transition:all .2s;font-family:var(--sans)}
.splash-cta:hover{background:rgba(240,235,227,.08)}

/* ── SCREEN 1 — camera ── */
#s-camera{background:#1A1916}
.cam-header{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,20px) 22px 16px}
.cam-logo{font-family:var(--serif);font-size:18px;color:var(--cream)}
.cam-hint{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--taupe)}

/* Video fills screen */
video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}

/* Viewfinder overlay */
.vf-overlay{position:absolute;inset:0;pointer-events:none}
.vf-corner{position:absolute;width:22px;height:22px}
.vf-corner.tl{top:18%;left:12%;border-top:2px solid var(--cream);border-left:2px solid var(--cream)}
.vf-corner.tr{top:18%;right:12%;border-top:2px solid var(--cream);border-right:2px solid var(--cream)}
.vf-corner.bl{bottom:22%;left:12%;border-bottom:2px solid var(--cream);border-left:2px solid var(--cream)}
.vf-corner.br{bottom:22%;right:12%;border-bottom:2px solid var(--cream);border-right:2px solid var(--cream)}

/* Bottom controls */
.cam-controls{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:20px 32px calc(env(safe-area-inset-bottom,20px) + 20px);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(transparent,rgba(26,25,22,.85))}
.ctrl-side{width:52px}
.shutter{width:68px;height:68px;border-radius:50%;background:transparent;border:2px solid var(--cream);cursor:pointer;position:relative;transition:transform .12s;flex-shrink:0}
.shutter::after{content:'';position:absolute;inset:5px;border-radius:50%;background:var(--cream);transition:transform .12s}
.shutter:active{transform:scale(.93)}
.ctrl-btn{width:44px;height:44px;border-radius:50%;background:rgba(240,235,227,.1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--cream);font-size:15px;transition:background .2s}
.ctrl-btn:hover{background:rgba(240,235,227,.18)}

/* flip icon */
.flip-icon{display:inline-block;font-size:16px;line-height:1}

/* error state */
.cam-error{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:32px;text-align:center;background:#1A1916}
.cam-error-icon{font-size:32px;margin-bottom:8px}
.cam-error h2{font-family:var(--serif);font-size:22px;color:var(--cream);font-weight:400}
.cam-error p{font-size:12px;color:var(--taupe);line-height:1.6;max-width:260px}
.cam-error button{margin-top:8px;padding:12px 28px;border:1px solid var(--border2);border-radius:999px;background:transparent;color:var(--cream);font-family:var(--sans);font-size:10px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer}

/* ── SCREEN 2 — analyzing ── */
#s-analyzing{background:#1A1916;align-items:center;justify-content:center;gap:20px}
.analyzing-preview{width:160px;height:200px;border-radius:12px;overflow:hidden;position:relative;flex-shrink:0}
.analyzing-preview img{width:100%;height:100%;object-fit:cover}
.analyzing-label{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--taupe)}
.analyzing-dots{display:flex;gap:5px;margin-top:4px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--taupe);animation:pulse 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* ── SCREEN 3 — results ── */
#s-results{background:#1A1916;overflow-y:auto;-webkit-overflow-scrolling:touch}
.res-header{padding:env(safe-area-inset-top,20px) 22px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.res-logo{font-family:var(--serif);font-size:18px;color:var(--cream)}
.res-retake{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--taupe);background:transparent;border:1px solid var(--border2);border-radius:999px;padding:7px 16px;cursor:pointer;font-family:var(--sans);transition:all .2s}
.res-retake:hover{border-color:var(--taupe);color:var(--cream)}

.res-body{padding:0 22px 40px;display:flex;flex-direction:column;gap:28px}

/* photo strip */
.photo-strip{border-radius:12px;overflow:hidden;aspect-ratio:3/4;max-height:260px;position:relative}
.photo-strip img{width:100%;height:100%;object-fit:cover}
.photo-strip-overlay{position:absolute;bottom:0;left:0;right:0;padding:16px 16px 14px;background:linear-gradient(transparent,rgba(26,25,22,.88))}
.photo-insight{font-family:var(--serif);font-style:italic;font-size:14px;color:var(--cream);line-height:1.5}

/* section */
.section-lbl{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--taupe);margin-bottom:12px}

/* bars */
.bars{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:12px;color:var(--cream);min-width:94px}
.bar-track{flex:1;height:2px;background:var(--border2);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;background:var(--cream);border-radius:999px;width:0;transition:width .7s cubic-bezier(.22,.61,.36,1)}
.bar-pct{font-family:var(--mono);font-size:10px;color:var(--taupe);min-width:28px;text-align:right}

/* tags */
.tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{font-size:10px;letter-spacing:.06em;padding:6px 14px;border-radius:999px;border:1px solid var(--border2);color:var(--taupe)}

/* trace again */
.trace-again{width:100%;padding:15px;border:1px solid var(--border2);border-radius:999px;background:transparent;color:var(--cream);font-family:var(--sans);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.trace-again:hover{background:rgba(240,235,227,.08)}

/* error */
.res-error{background:rgba(220,50,50,.12);border:1px solid rgba(220,50,50,.25);border-radius:10px;padding:16px;font-size:12px;color:#EF9090;line-height:1.6}

/* canvas hidden */
#capture-canvas{display:none}
</style>
</head>
<body>

<!-- SCREEN 0: SPLASH -->
<div class="screen" id="s-splash">
  <p class="splash-logo">outft.</p>
  <p class="splash-sub">style DNA detector</p>
  <button class="splash-cta" onclick="startCamera()">trace your fit</button>
</div>

<!-- SCREEN 1: CAMERA -->
<div class="screen hidden" id="s-camera">
  <div class="cam-header">
    <span class="cam-logo">outft.</span>
    <span class="cam-hint" id="cam-hint">align outfit in frame</span>
  </div>

  <video id="video" autoplay playsinline muted style="display:block"></video>
  <canvas id="capture-canvas"></canvas>

  <div class="vf-overlay">
    <div class="vf-corner tl"></div>
    <div class="vf-corner tr"></div>
    <div class="vf-corner bl"></div>
    <div class="vf-corner br"></div>
  </div>

  <div class="cam-controls">
    <div class="ctrl-side">
      <button class="ctrl-btn" id="flip-btn" onclick="flipCamera()" aria-label="Flip camera">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
      </button>
    </div>
    <button class="shutter" onclick="capture()" aria-label="Capture outfit"></button>
    <div class="ctrl-side"></div>
  </div>

  <!-- camera error state (shown if permission denied) -->
  <div class="cam-error" id="cam-error" style="display:none">
    <div class="cam-error-icon">⟳</div>
    <h2>camera access needed</h2>
    <p>Allow camera access in your browser settings, then tap to try again.</p>
    <button onclick="startCamera()">try again</button>
  </div>
</div>

<!-- SCREEN 2: ANALYZING -->
<div class="screen hidden" id="s-analyzing">
  <div class="analyzing-preview">
    <img id="analyzing-img" src="" alt="captured outfit">
  </div>
  <span class="analyzing-label">reading your trace</span>
  <div class="analyzing-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<!-- SCREEN 3: RESULTS -->
<div class="screen hidden" id="s-results">
  <div class="res-header">
    <span class="res-logo">outft.</span>
    <button class="res-retake" onclick="goTo('camera')">retrace</button>
  </div>
  <div class="res-body" id="res-body"></div>
</div>

<script>
const screens = ['splash','camera','analyzing','results'];
let currentFacing = 'environment';
let stream = null;
let capturedDataUrl = null;

function goTo(name) {
  screens.forEach(s => {
    const el = document.getElementById('s-'+s);
    el.classList.toggle('hidden', s !== name);
  });
}

async function startCamera() {
  goTo('camera');
  document.getElementById('cam-error').style.display='none';
  await openStream(currentFacing);
}

async function openStream(facing) {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facing }, width: { ideal: 1280 }, height: { ideal: 1920 } },
      audio: false
    });
    const vid = document.getElementById('video');
    vid.srcObject = stream;
    await vid.play();
  } catch(e) {
    document.getElementById('cam-error').style.display='flex';
    document.getElementById('cam-hint').textContent = 'camera unavailable';
    console.error('Camera error:', e);
  }
}

async function flipCamera() {
  currentFacing = currentFacing === 'environment' ? 'user' : 'environment';
  await openStream(currentFacing);
}

function capture() {
  const vid = document.getElementById('video');
  const cnv = document.getElementById('capture-canvas');
  const w = vid.videoWidth || 1280;
  const h = vid.videoHeight || 1920;
  cnv.width = w; cnv.height = h;
  const ctx = cnv.getContext('2d');
  if (currentFacing === 'user') {
    ctx.translate(w, 0); ctx.scale(-1, 1);
  }
  ctx.drawImage(vid, 0, 0, w, h);
  capturedDataUrl = cnv.toDataURL('image/jpeg', 0.88);
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  analyze();
}

async function analyze() {
  document.getElementById('analyzing-img').src = capturedDataUrl;
  goTo('analyzing');

  const base64 = capturedDataUrl.split(',')[1];
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageBase64: base64, mediaType: 'image/jpeg' })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Analysis failed');
    buildResults(data);
  } catch(e) {
    buildError(e.message);
  }
  goTo('results');
}

function buildResults(j) {
  const body = document.getElementById('res-body');
  body.innerHTML = '';

  // Photo with insight overlay
  const strip = document.createElement('div');
  strip.className = 'photo-strip';
  const img = document.createElement('img');
  img.src = capturedDataUrl;
  img.alt = 'your outfit';
  strip.appendChild(img);
  if (j.insight) {
    const ov = document.createElement('div');
    ov.className = 'photo-strip-overlay';
    const ins = document.createElement('p');
    ins.className = 'photo-insight';
    ins.textContent = '\u201c' + j.insight + '\u201d';
    ov.appendChild(ins);
    strip.appendChild(ov);
  }
  body.appendChild(strip);

  // Aesthetic breakdown
  if (j.aesthetics?.length) {
    const sec = document.createElement('div');
    const lbl = document.createElement('p');
    lbl.className = 'section-lbl';
    lbl.textContent = 'aesthetic breakdown';
    sec.appendChild(lbl);
    const bars = document.createElement('div');
    bars.className = 'bars';
    j.aesthetics.forEach((a, i) => {
      const row = document.createElement('div');
      row.className = 'bar-row';
      row.innerHTML = `<span class="bar-label">${a.label}</span><div class="bar-track"><div class="bar-fill" id="bf${i}"></div></div><span class="bar-pct">${a.pct}%</span>`;
      bars.appendChild(row);
    });
    sec.appendChild(bars);
    body.appendChild(sec);
    j.aesthetics.forEach((a, i) => setTimeout(() => {
      const el = document.getElementById('bf'+i);
      if (el) el.style.width = a.pct + '%';
    }, 80 + i * 100));
  }

  // Style tags
  if (j.tags?.length) {
    const sec = document.createElement('div');
    const lbl = document.createElement('p');
    lbl.className = 'section-lbl';
    lbl.textContent = 'style tags';
    sec.appendChild(lbl);
    const tagWrap = document.createElement('div');
    tagWrap.className = 'tags';
    j.tags.forEach(t => {
      const sp = document.createElement('span');
      sp.className = 'tag';
      sp.textContent = t;
      tagWrap.appendChild(sp);
    });
    sec.appendChild(tagWrap);
    body.appendChild(sec);
  }

  // Trace again button
  const btn = document.createElement('button');
  btn.className = 'trace-again';
  btn.textContent = 'trace another fit';
  btn.onclick = () => startCamera();
  body.appendChild(btn);
}

function buildError(msg) {
  const body = document.getElementById('res-body');
  body.innerHTML = `<div class="res-error">
    <strong>Something went wrong.</strong><br>${msg}<br><br>
    Make sure <code>ANTHROPIC_API_KEY</code> is set and the server is running.
  </div>
  <button class="trace-again" onclick="startCamera()">try again</button>`;
}
</script>
</body>
</html>
